<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Exam Portal - Quiz Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
        }
        .form-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 40px;
        }
        .form-card h2 {
            color: #1e3c72;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            background-color: #f9f9f9;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #1e3c72;
            background-color: #fff;
            box-shadow: 0 0 8px rgba(30, 60, 114, 0.2);
        }
        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            font-size: 15px;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }
        .btn-secondary:hover {
            background: #cbd5e0;
        }
    </style>
</head>
<body>
<div class="navbar">
    <a th:href="@{/dashboard}"><h1>🎓 Online Exam Portal</h1></a>
</div>

<div class="container">
    <div class="form-card">
        <h2 th:text="${quiz.id == null ? '➕ Create New Quiz' : '✏️ Edit Quiz Details'}">Quiz Details</h2>
        
        <form method="post" th:object="${quiz}">
            <div class="form-group">
                <label for="title">Quiz Title</label>
                <input type="text" id="title" th:field="*{title}" required placeholder="e.g. Java Fundamentals Quiz">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" rows="4" placeholder="Brief summary of the topics covered in this quiz..."></textarea>
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="timeLimitInMinutes">Time Limit (Minutes)</label>
                    <input type="number" id="timeLimitInMinutes" th:field="*{timeLimitInMinutes}" required min="1" max="180">
                </div>

                <div class="form-group">
                    <label for="passPercentage">Passing Percentage (%)</label>
                    <input type="number" id="passPercentage" th:field="*{passPercentage}" required min="0" max="100">
                </div>
            </div>

            <div class="action-buttons">
                <a th:href="@{/teacher/quizzes}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary" th:text="${quiz.id == null ? 'Create Quiz' : 'Save Changes'}">Save</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
