<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Exam Portal - Take Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            color: #333;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
        }
        .timer-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .timer-warning {
            background-color: #e53e3e !important;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px 60px 20px;
        }
        .instruction-card {
            background: #ebf8ff;
            border-left: 4px solid #3182ce;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 14px;
            color: #2b6cb0;
        }
        .question-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid #eee;
        }
        .question-number {
            font-weight: 700;
            color: #1e3c72;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .question-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-item:hover {
            background-color: #f7fafc;
            border-color: #cbd5e0;
        }
        .option-item input[type="radio"] {
            margin-right: 12px;
            transform: scale(1.2);
            cursor: pointer;
        }
        .option-item input[type="radio"]:checked + span {
            font-weight: 600;
            color: #1e3c72;
        }
        .option-item.selected {
            background-color: #ebf8ff;
            border-color: #bee3f8;
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 161, 105, 0.4);
        }
    </style>
</head>
<body>
<div class="header">
    <h1 th:text="${quiz.title}">Quiz Title</h1>
    <div id="timer" class="timer-box">
        <span>⏱️</span> <span id="time-display">00:00</span>
    </div>
</div>

<div class="container">
    <div class="instruction-card">
        <strong>📝 Guidelines:</strong>
        <ul style="margin-left: 20px; margin-top: 5px;">
            <li>Please do not refresh the page or navigate away during the exam. Doing so will auto-submit your current answers.</li>
            <li>The exam will automatically submit when the timer expires.</li>
        </ul>
    </div>

    <form id="quizForm" method="post" th:action="@{'/quizzes/' + ${quiz.id} + '/submit'}">
        <div th:each="question, iter : ${quiz.questions}" class="question-card">
            <div class="question-number" th:text="${'Question ' + (iter.index + 1)}">Question 1</div>
            <div class="question-text" th:text="${question.content}">Question Content</div>
            <div class="options-list">
                <label class="option-item">
                    <input type="radio" th:name="${'question_' + question.id}" value="A" onclick="highlightOption(this)">
                    <span th:text="${question.optionA}">Option A</span>
                </label>
                <label class="option-item">
                    <input type="radio" th:name="${'question_' + question.id}" value="B" onclick="highlightOption(this)">
                    <span th:text="${question.optionB}">Option B</span>
                </label>
                <label class="option-item">
                    <input type="radio" th:name="${'question_' + question.id}" value="C" onclick="highlightOption(this)">
                    <span th:text="${question.optionC}">Option C</span>
                </label>
                <label class="option-item">
                    <input type="radio" th:name="${'question_' + question.id}" value="D" onclick="highlightOption(this)">
                    <span th:text="${question.optionD}">Option D</span>
                </label>
            </div>
        </div>

        <button type="submit" class="btn-submit" onclick="return confirmSubmit()">Submit Exam</button>
    </form>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const timeLimitInMins = /*[[${quiz.timeLimitInMinutes}]]*/ 10;
    let totalSeconds = timeLimitInMins * 60;
    const timerDisplay = document.getElementById("time-display");
    const timerBox = document.getElementById("timer");
    const quizForm = document.getElementById("quizForm");

    function updateTimer() {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        
        timerDisplay.textContent = 
            (minutes < 10 ? "0" + minutes : minutes) + ":" + 
            (seconds < 10 ? "0" + seconds : seconds);

        if (totalSeconds <= 60) {
            timerBox.classList.add("timer-warning");
        }

        if (totalSeconds <= 0) {
            clearInterval(timerInterval);
            alert("Time is up! Your exam will be submitted automatically.");
            isAutoSubmitting = true;
            quizForm.submit();
        } else {
            totalSeconds--;
        }
    }

    updateTimer();
    const timerInterval = setInterval(updateTimer, 1000);

    let isAutoSubmitting = false;

    function confirmSubmit() {
        return confirm("Are you sure you want to submit your exam?");
    }

    function highlightOption(radio) {
        const optionList = radio.closest(".options-list");
        const items = optionList.querySelectorAll(".option-item");
        items.forEach(item => item.classList.remove("selected"));
        radio.closest(".option-item").classList.add("selected");
    }

    // Warn before navigating away
    window.addEventListener("beforeunload", function (e) {
        if (!isAutoSubmitting) {
            const confirmationMessage = "Are you sure you want to leave? Your exam progress will be submitted.";
            (e || window.event).returnValue = confirmationMessage;
            return confirmationMessage;
        }
    });

    // Auto submit on unload if leaving
    quizForm.addEventListener("submit", () => {
        isAutoSubmitting = true;
    });
    /*]]>*/
</script>
</body>
</html>
